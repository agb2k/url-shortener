name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/url-shortener
            git pull origin main
            docker compose -f docker-compose.production.yml up -d --build
            docker compose -f docker-compose.production.yml exec -T web bin/rails db:migrate
            docker compose -f docker-compose.production.yml exec -T web bin/rails db:migrate:analytics
