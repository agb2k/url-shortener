# Production stack for EC2 (or any single host).
# Usage: clone repo on server, create .env.production (see DEPLOY.md), then:
#   docker compose -f docker-compose.production.yml up -d
#   docker compose -f docker-compose.production.yml exec web bin/rails db:migrate:analytics  # if needed

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: url_shortener
      POSTGRES_PASSWORD: ${URL_SHORTENER_DATABASE_PASSWORD}
      POSTGRES_DB: url_shortener_production
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init-production-databases.sql:/docker-entrypoint-initdb.d/02-create-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U url_shortener -d url_shortener_production"]
      interval: 5s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      clickhouse: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports:
      - "80:80"
    env_file:
      - .env.production
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_USERNAME: default
      REDIS_URL: redis://redis:6379/0
      SHORT_URL_BASE: ${SHORT_URL_BASE:-http://localhost}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
  clickhouse_data:
  redis_data:
